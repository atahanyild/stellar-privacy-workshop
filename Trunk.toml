[build]
target = "app/index.html"
public-url = "/"
dist = "dist"
filehash = false
release = true

[watch]
watch = ["app", "circuits"]
ignore = ["app/node_modules", "dist"]

[serve]
addresses = ["0.0.0.0"]
port = 8000

[tools]
tailwindcss = "4.1.18"

# Copy all static assets to staging
[[hooks]]
stage = "pre_build"
command = "sh"
command_arguments = ["-c", """
mkdir -p $TRUNK_STAGING_DIR/circuits

# Circuit artifacts from a deterministic publish directory
#
# `circuits/build.rs` publishes to:
#   target/circuits-artifacts/<profile>/{name}.r1cs
#   target/circuits-artifacts/<profile>/{name}.wasm
#
# Trunk is configured with `release = true`, so prefer `release/` but fall back
# to `debug/` if it exists (still deterministic).
CIRCUIT_OUT=""
if [ -d target/circuits-artifacts/release ]; then
    CIRCUIT_OUT=target/circuits-artifacts/release
elif [ -d target/circuits-artifacts/debug ]; then
    CIRCUIT_OUT=target/circuits-artifacts/debug
fi

if [ -n "$CIRCUIT_OUT" ]; then
    cp "$CIRCUIT_OUT"/*.r1cs $TRUNK_STAGING_DIR/circuits/ 2>/dev/null || true
    cp "$CIRCUIT_OUT"/*.wasm $TRUNK_STAGING_DIR/circuits/ 2>/dev/null || true
else
    echo "trunk:warning: no circuit artifacts found in target/circuits-artifacts/{release,debug}; run 'cargo build -p circuits --release' to generate them" >&2
fi

# Static files
cp app/admin.html $TRUNK_STAGING_DIR/ 2>/dev/null || true

# Distribution legal files (licenses + notices).
sh deployments/scripts/stage-dist-legal.sh "$TRUNK_STAGING_DIR"

# Bundle corresponding source for LGPL compliance (served as a downloadable archive).
sh deployments/scripts/package-circuits-source-bundle.sh "$TRUNK_STAGING_DIR/circuits/source-bundle.tar.gz"
"""]

# Bundle JS with esbuild
[[hooks]]
stage = "build"
command = "sh"
command_arguments = ["-c", """
./app/node_modules/.bin/esbuild app/js/ui.js --external:./web.js --bundle --outfile=$TRUNK_STAGING_DIR/js/ui.js --format=esm
./app/node_modules/.bin/esbuild app/js/admin.js --external:./web.js --bundle --outfile=$TRUNK_STAGING_DIR/js/admin.js --format=esm
"""]
